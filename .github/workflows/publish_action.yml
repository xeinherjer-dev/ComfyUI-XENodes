name: Publish to Comfy registry

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish-node:
    name: Publish Custom Node to registry
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          # Required to fetch tag annotations for the release notes
          fetch-depth: 0

      - name: Create GitHub Release from Tag Message
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract the message from the annotated tag
          TAG_MSG=$(git tag -l --format='%(contents)' ${{ github.ref_name }})

          # Use a default message if the annotation is empty
          if [ -z "$TAG_MSG" ]; then
            TAG_MSG="Release ${{ github.ref_name }}"
          fi

          # Create the GitHub Release first so Comfy Registry can index the updates
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "$TAG_MSG"

      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
