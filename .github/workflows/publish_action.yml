name: Publish to Comfy registry

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish-node:
    name: Publish Custom Node to registry
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create GitHub Release from Tag Message
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Force fetch all tags to guarantee the runner has the annotated tag object
          git fetch --tags --force

          # Extract the message from the tag
          TAG_MSG=$(git tag -l --format='%(contents)' ${{ github.ref_name }})

          # Fallback if somehow still empty
          if [ -z "$TAG_MSG" ]; then
            TAG_MSG="Release ${{ github.ref_name }}"
          fi

          # Create release.
          # --generate-notes automatically appends the "Full Changelog" link and commit history!
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "$TAG_MSG" \
            --generate-notes

      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
